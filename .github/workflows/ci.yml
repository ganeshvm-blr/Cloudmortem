# CloudMortem CI pipeline
name: CloudMortem CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  validate:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::716215155311:role/cloudmortem-dev-terraform-plan-role
          aws-region: ap-south-1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python syntax validation
        run: |
          python -m compileall terraform/infrastructure/lambda_src

      - name: Install Python test dependencies
        run: |
          python -m pip install pytest

      - name: Run Python tests
        run: |
          pytest tests/

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform format check
        run: |
          terraform fmt -check -recursive terraform

      - name: Terraform validate bootstrap
        working-directory: terraform/bootstrap
        run: |
          terraform init -backend=false
          terraform validate

      - name: Terraform validate infrastructure
        working-directory: terraform/infrastructure
        run: |
          terraform init -backend=false
          terraform validate
