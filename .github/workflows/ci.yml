name: CloudMortem CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest build

      - name: Run tests
        run: pytest

      - name: Build package
        run: python -m build

      - name: Verify wheel install
        run: |
          pip install dist/*.whl
          cloudmortem --help